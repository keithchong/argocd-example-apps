apiVersion: apps/v1
kind: Deployment
metadata:
  name: addressbook-ui-1
  namespace: openshift-gitops
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: addressbook-ui-1
  template:
    metadata:
      labels:
        app: addressbook-ui-1
    spec:
      containers:
      - image: quay.io/argoprojlabs/argocd-e2e-container:0.2
        name: addressbook-ui-1
        ports:
        - containerPort: 80

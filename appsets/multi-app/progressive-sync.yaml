apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: appset-multi-ps
  namespace: openshift-gitops
spec:
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - cluster: engineering-dev
                  url: https://kubernetes.default.svc
                  env: env-dev
                  values:
                    project: default
                - cluster: engineering-qa
                  url: https://kubernetes.default.svc
                  env: env-qa
                  values:
                    project: default
                - cluster: engineering-staging
                  url: https://kubernetes.default.svc
                  env: env-staging
                  values:
                    project: default
                - cluster: engineering-prod
                  url: https://kubernetes.default.svc
                  env: env-prod
                  values:
                    project: default
          - list:
              elements:
                - values:
                    suffix: 'addressbook'
                - values:
                    suffix: 'guestbook'
  strategy:
    type: RollingSync
    deletionOrder: Reverse # Applications will be deleted in reverse order of steps
    rollingSync:
      steps:
        - matchExpressions:
            - key: envLabel
              operator: In
              values:
                - env-dev
          #maxUpdate: 100%  # if undefined, all applications matched are updated together (default is 100%)
        - matchExpressions:
            - key: envLabel
              operator: In
              values:
                - env-qa
          maxUpdate: 0 # if 0, no matched applications will be updated
        - matchExpressions:
            - key: envLabel
              operator: In
              values:
                - env-staging
          maxUpdate: 0 # if 0, no matched applications will be updated
        - matchExpressions:
            - key: envLabel
              operator: In
              values:
                - env-prod
          maxUpdate: 10% # maxUpdate supports both integer and percentage string values (rounds down, but floored at 1 Application for >0%)
  goTemplate: true
  goTemplateOptions: ['missingkey=error']
  template:
    metadata:
      name: '{{.cluster}}-{{.values.suffix}}'
      labels:
        envLabel: '{{.env}}'
    spec:
      project: '{{.values.project}}'
      source:
        repoURL: https://github.com/keithchong/argocd-example-apps
        targetRevision: HEAD
        path: appsets/multi-app/{{.values.suffix}}/{{.cluster}}
      destination:
        server: '{{.url}}'
        namespace: openshift-gitops
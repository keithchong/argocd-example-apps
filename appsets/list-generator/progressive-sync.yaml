apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: appsetps
  namespace: openshift-gitops
spec:
  generators:
    - list:
        elements:
          - cluster: engineering-dev
            url: https://kubernetes.default.svc
            env: env-dev
          - cluster: engineering-qa
            url: https://kubernetes.default.svc
            env: env-qa
          - cluster: engineering-prod
            url: https://kubernetes.default.svc
            env: env-prod
  strategy:
    type: RollingSync
    deletionOrder: Reverse # Applications will be deleted in reverse order of steps
    rollingSync:
      steps:
        - matchExpressions:
            - key: envLabel
              operator: In
              values:
                - env-dev
          #maxUpdate: 100%  # if undefined, all applications matched are updated together (default is 100%)
        - matchExpressions:
            - key: envLabel
              operator: In
              values:
                - env-qa
          maxUpdate: 0 # if 0, no matched applications will be updated
        - matchExpressions:
            - key: envLabel
              operator: In
              values:
                - env-prod
          maxUpdate: 10% # maxUpdate supports both integer and percentage string values (rounds down, but floored at 1 Application for >0%)
  goTemplate: true
  goTemplateOptions: ['missingkey=error']
  template:
    metadata:
      name: '{{.cluster}}-appsetps'
      labels:
        envLabel: '{{.env}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/keithchong/gitops-examples
        targetRevision: HEAD
        path: appsets/list-generator/guestbook/{{.cluster}}
      destination:
        server: '{{.url}}'
        namespace: openshift-gitops